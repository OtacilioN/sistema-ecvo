services:
  postgres:
    image: postgres:18-alpine
    container_name: sistema-ecvo-postgres
    environment:
      POSTGRES_DB: ecvo_dev
      POSTGRES_USER: ecvo
      POSTGRES_PASSWORD: ecvo_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecvo -d ecvo_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
